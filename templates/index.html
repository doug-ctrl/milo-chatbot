<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milo AI - Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --user-bg: #007AFF; --milo-bg: #E9E9EB; --text-dark: #1C1C1E; }
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { padding: 20px 20px 10px 20px; background: #fff; text-align: center; font-weight: 600; font-size: 1.2rem; }

        /* About Link Styling */
        .about-link { text-align: center; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .about-link a { color: #888; text-decoration: none; font-size: 0.8rem; font-weight: 400; transition: color 0.2s; }
        .about-link a:hover { color: var(--user-bg); }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* Bubble Styling */
        .message { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--user-bg); color: white; border-bottom-right-radius: 4px; }
        .milo { align-self: flex-start; background: var(--milo-bg); color: var(--text-dark); border-bottom-left-radius: 4px; }

        /* Input Styling */
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 1rem; }
        button { background: var(--user-bg); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>Milo AI</header>
        <div class="about-link">
            <a href="/about">About Milo</a>
        </div>

        <div id="chat-box">
            <div class="message milo">Hello, {{ user }}! I'm Milo. How can I help you today?</div>
        </div>

        <div id="typing-indicator" style="display:none; padding: 0 20px 10px 20px; font-style: italic; color: #888; font-size: 0.8rem;">
            Milo is thinking...
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Message Milo..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const indicator = document.getElementById('typing-indicator');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();

            if(!text) return;

            // 1. Add user message & Scroll
            box.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // 2. Show "Thinking" and disable button
            indicator.style.display = 'block';
            btn.disabled = true;
            box.scrollTop = box.scrollHeight;

            try {
                // 3. Fetch bot response
                const response = await fetch('/get_response', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await response.json();

                // 4. Add Milo's message
                box.innerHTML += `<div class="message milo">${data.response}</div>`;
            } catch (error) {
                box.innerHTML += `<div class="message milo" style="color: red;">Sorry, I encountered an error.</div>`;
            } finally {
                // 5. Hide indicator and re-enable button
                indicator.style.display = 'none';
                btn.disabled = false;
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
